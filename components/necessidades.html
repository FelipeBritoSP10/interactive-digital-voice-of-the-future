<div class="section-panel active" id="panel-necessidades">

    <p class="text-uppercase fw-bold text-secondary mb-3"
        style="font-size:.7rem;letter-spacing:.1em">
        O que eu preciso
    </p>

    <div class="row g-3">

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-water"
                onclick="speakMessage('Quero água')">
                <div class="btn-icon">
                    <i class="bi bi-droplet-fill"></i>
                </div>
                <span class="fw-semibold">Água</span>
                <span class="text-secondary">Quero água</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-food"
                onclick="speakMessage('Quero comer')">
                <div class="btn-icon">
                    <i class="bi bi-egg-fried"></i>
                </div>
                <span class="fw-semibold">Comida</span>
                <span class="text-secondary">Quero comer</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-bath"
                onclick="speakMessage('Quero ir ao banheiro')">
                <div class="btn-icon">
                    <i class="bi bi-door-open-fill"></i>
                </div>
                <span class="fw-semibold">Banheiro</span>
                <span class="text-secondary">Preciso ir</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-sleep"
                onclick="speakMessage('Estou com sono, quero descansar')">
                <div class="btn-icon">
                    <i class="bi bi-moon-stars-fill"></i>
                </div>
                <span class="fw-semibold">Sono</span>
                <span class="text-secondary">Quero descansar</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-help"
                onclick="speakMessage('Preciso de ajuda')">
                <div class="btn-icon">
                    <i class="bi bi-person-raised-hand"></i>
                </div>
                <span class="fw-semibold">Ajuda</span>
                <span class="text-secondary">Preciso de ajuda</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-hot"
                onclick="speakMessage('Estou com calor')">
                <div class="btn-icon">
                    <i class="bi-brightness-high-fill"></i>
                </div>
                <span class="fw-semibold">Calor</span>
                <span class="text-secondary">Estou com calor</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-cold"
                onclick="speakMessage('Estou com frio')">
                <div class="btn-icon">
                    <i class="bi bi-snow2"></i>
                </div>
                <span class="fw-semibold">Frio</span>
                <span class="text-secondary">Estou com frio</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-play"
                onclick="speakMessage('Quero brincar')">
                <div class="btn-icon">
                    <i class="bi bi-controller"></i>
                </div>
                <span class="fw-semibold">Brincar</span>
                <span class="text-secondary">Quero brincar</span>
            </button>
        </div>

    </div>
</div>
