<div class="section-panel" id="panel-comunicacao">

    <p class="text-uppercase fw-bold text-secondary mb-3"
        style="font-size:.7rem;letter-spacing:.1em">
        O que quero dizer
    </p>

    <div class="row g-3">

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-yes"
                onclick="speakMessage('Sim')">
                <div class="btn-icon">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <span class="fw-semibold">Sim</span>
                <span class="text-secondary">Concordo</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-no"
                onclick="speakMessage('Não')">
                <div class="btn-icon">
                    <i class="bi bi-x-circle-fill"></i>
                </div>
                <span class="fw-semibold">Não</span>
                <span class="text-secondary">Discordo</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-more"
                onclick="speakMessage('Quero mais')">
                <div class="btn-icon">
                    <i class="bi bi-plus-circle-fill"></i>
                </div>
                <span class="fw-semibold">Mais</span>
                <span class="text-secondary">Quero mais</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-stop"
                onclick="speakMessage('Para, por favor')">
                <div class="btn-icon">
                    <i class="bi bi-stop-circle-fill"></i>
                </div>
                <span class="fw-semibold">Para</span>
                <span class="text-secondary">Chega, por favor</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-where"
                onclick="speakMessage('Onde estamos indo?')">
                <div class="btn-icon">
                    <i class="bi bi-geo-alt-fill"></i>
                </div>
                <span class="fw-semibold">Onde?</span>
                <span class="text-secondary">Para onde vamos?</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-what"
                onclick="speakMessage('O que é isso?')">
                <div class="btn-icon">
                    <i class="bi bi-question-circle-fill"></i>
                </div>
                <span class="fw-semibold">O que é?</span>
                <span class="text-secondary">Não entendi</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-like"
                onclick="speakMessage('Eu gostei muito!')">
                <div class="btn-icon">
                    <i class="bi bi-hand-thumbs-up-fill"></i>
                </div>
                <span class="fw-semibold">Gostei!</span>
                <span class="text-secondary">Eu gostei</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-dont"
                onclick="speakMessage('Não gostei')">
                <div class="btn-icon">
                    <i class="bi bi-hand-thumbs-down-fill"></i>
                </div>
                <span class="fw-semibold">Não gostei</span>
                <span class="text-secondary">Não quero</span>
            </button>
        </div>

    </div>
</div>
