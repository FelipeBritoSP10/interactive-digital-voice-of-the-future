<div class="section-panel" id="panel-emocoes">

    <p class="text-uppercase fw-bold text-secondary mb-3"
        style="font-size:.7rem;letter-spacing:.1em">
        Como estou me sentindo
    </p>

    <div class="row g-3">

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-happy"
                onclick="speakMessage('Estou feliz')">
                <div class="btn-icon">
                    <i class="bi bi-emoji-laughing-fill"></i>
                </div>
                <span class="fw-semibold">Feliz</span>
                <span class="text-secondary">Estou bem</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-sad"
                onclick="speakMessage('Estou triste')">
                <div class="btn-icon">
                    <i class="bi bi-emoji-frown-fill"></i>
                </div>
                <span class="fw-semibold">Triste</span>
                <span class="text-secondary">Estou mal</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-pain"
                onclick="speakMessage('Estou com dor')">
                <div class="btn-icon">
                    <i class="bi bi-heartbreak-fill"></i>
                </div>
                <span class="fw-semibold">Dor</span>
                <span class="text-secondary">Está doendo</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-angry"
                onclick="speakMessage('Estou com raiva')">
                <div class="btn-icon">
                    <i class="bi bi-emoji-angry-fill"></i>
                </div>
                <span class="fw-semibold">Raiva</span>
                <span class="text-secondary">Estou bravo</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-scared"
                onclick="speakMessage('Estou com medo')">
                <div class="btn-icon">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <span class="fw-semibold">Medo</span>
                <span class="text-secondary">Estou assustado</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-tired"
                onclick="speakMessage('Estou cansado')">
                <div class="btn-icon">
                    <i class="bi bi-battery-half"></i>
                </div>
                <span class="fw-semibold">Cansado</span>
                <span class="text-secondary">Sem energia</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-love"
                onclick="speakMessage('Te amo muito')">
                <div class="btn-icon">
                    <i class="bi bi-heart-fill"></i>
                </div>
                <span class="fw-semibold">Amor</span>
                <span class="text-secondary">Te amo muito</span>
            </button>
        </div>

        <div class="col-6 col-md-3">
            <button class="btn-caa cat-ok"
                onclick="speakMessage('Estou bem, obrigado')">
                <div class="btn-icon">
                    <i class="bi bi-emoji-smile-fill"></i>
                </div>
                <span class="fw-semibold">Tudo bem</span>
                <span class="text-secondary">Estou bem</span>
            </button>
        </div>

    </div>
</div>
