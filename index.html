<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz do Futuro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                🗣️ Voz do Futuro
            </span>
        </div>
    </nav>

    <div class="container py-4">

        <h1 class="text-center text-primary fw-bold">
            Comunicação Inclusiva
        </h1>

        <p class="text-center text-muted">
            Tecnologia assistiva para crianças não verbais
        </p>

        <div class="card shadow-sm p-4 text-center mb-4">
            <h2 id="message">
                Selecione uma opção abaixo
            </h2>
        </div>

        <div class="d-flex gap-2 justify-content-center mb-4">
            <button class="btn btn-primary" onclick="showTab('necessidades')">
                Necessidades
            </button>

            <button class="btn btn-outline-primary" onclick="showTab('emocoes')">
                Emoções
            </button>

            <button class="btn btn-outline-primary" onclick="showTab('comunicacao')">
                Comunicação
            </button>

        </div>

        <div id="necessidades" class="tab-content-custom">
            <div class="row g-3">

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Quero água')">
                        💧 Água
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Quero comer')">
                        🍽️ Comida
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Preciso de ajuda')">
                        🤝 Ajuda
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Quero brincar')">
                        🎈 Brincar
                    </button>
                </div>

            </div>

        </div>

        <div id="emocoes" class="tab-content-custom d-none">
            <div class="row g-3">
                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Estou feliz')">
                        😊 Feliz
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Estou triste')">
                        😢 Triste
                    </button>
                </div>

            </div>

        </div>

        <div id="comunicacao" class="tab-content-custom d-none">
            <div class="row g-3">

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Sim')">
                        ✅ Sim
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn-card" onclick="speakMessage('Não')">
                        ❌ Não
                    </button>
                </div>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

    <script src="js/tabs.js"></script>

    <script src="js/speech.js"></script>

</body>
</html>
